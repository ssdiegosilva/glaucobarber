<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>GlaucoBarber</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: #D4A853;
      margin-bottom: 1rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(212, 168, 83, 0.2);
      border-top-color: #D4A853;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.5rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { color: #888; font-size: 0.9rem; }
    .offline { display: none; }
    .offline p { color: #888; margin-bottom: 1.5rem; line-height: 1.5; }
    .retry-btn {
      background: #D4A853;
      color: #000;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Loading state (shown while redirecting to live site) -->
  <div class="container" id="loading">
    <div class="logo">GlaucoBarber</div>
    <div class="spinner"></div>
    <p class="status">Carregando...</p>
  </div>

  <!-- Offline state (shown when no internet) -->
  <div class="container offline" id="offline">
    <div class="logo">GlaucoBarber</div>
    <p>Sem conexão com a internet.<br/>Verifique sua rede e tente novamente.</p>
    <button class="retry-btn" onclick="tryConnect()">Tentar novamente</button>
  </div>

  <script>
    // The Capacitor config has server.url set to glaucobarber.com,
    // so it will automatically load the live site.
    // This shell is only shown briefly during startup or when offline.

    function tryConnect() {
      document.getElementById('offline').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      // Attempt to reach the live site
      fetch('https://glaucobarber.com/api/health', { mode: 'no-cors' })
        .then(() => {
          window.location.href = 'https://glaucobarber.com';
        })
        .catch(() => {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('offline').style.display = 'block';
        });
    }

    // Check connectivity on load
    window.addEventListener('load', () => {
      if (!navigator.onLine) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('offline').style.display = 'block';
      }
    });

    window.addEventListener('offline', () => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('offline').style.display = 'block';
    });

    window.addEventListener('online', () => {
      tryConnect();
    });
  </script>
</body>
</html>
